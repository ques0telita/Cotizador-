<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Cotizador</title>
    <link rel="icon" type="image/png" href="bitcoin.png">
</head>
<body>
    <video class="bg-video" src="BG-crypto.mp4" autoplay muted loop></video>
    <div id="container">
        <div id="coin-container">
            <form id="coin-form">
                <div class="coin-input-container">
                    <label for="coin">Moneda</label>
                    <select class="coin-input" id="coin">
                        <option selected disabled value="">Selecciona tu moneda</option>
                        <option value="USD">DOLAR</option>
                        <option value="EUR">EURO</option>
                        <option value="CNY">YUAN</option>
                        <option value="VES">BOLIVARES</option>
                    </select>
                </div>
                <div class="coin-input-container">
                    <label for="crypto">CryptoMoneda</label>
                    <select class="coin-input" id="crypto">
                        <option id="casillero" selected disabled value="">Selecciona tu CryptoMoneda</option>
                        <option value="BTC">BITCOIN</option>
                        <option value="ETH">ETHEREUM</option>
                        <option value="BNB">BINANCE</option>
                        <option value="XRP">RIPPLE</option>
                    </select>
                </div>
                <div class="coin-input-container">
                    <label for="amount-input">Ingresa el monto a cotizar</label>
                    <input type="number" class="coin-input" id="amount-input" placeholder="Monto a cotizar">
                </div>
                <button id="form-btn" type="submit">Cotizar</button>
            </form>
        
            <div id="resultado-container">
                <div class="principal-price">
                    <span>Puedes comprar</span>
                    <h2 id="amount">$0.00</h2>
                </div>

                <div class="details-grid">
                    <div class="dato-card">
                        <span>Precio actual</span>
                        <p id="price">--</p>
                    </div>

                    <div class="dato-card">
                        <span>Variación 24h</span>
                        <p id="change-24h">--</p>
                    </div>

                    <div class="dato-card">
                        <span>Precio mínimo 24h</span>
                        <p id="low-price">--</p>
                    </div>

                    <div class="dato-card">
                        <span>Precio máximo 24h</span>
                        <p id="high-price">--</p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
